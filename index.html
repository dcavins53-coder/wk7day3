<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holiday Explorer</title>

</head>
<body>

    <div class="card">
        <header>
            <h1>Holiday Worldwide</h1>
            <p class="subtitle">Enter a country code for 2026 holidays.</p>
        </header>

        <form id="input-form">
            <input type="text" id="countryInput" placeholder="e.g., US, GB, JP" maxlength="2">
            <button id="fetchBtn" type= "submit">Check Holidays</button>
        </form>

        <div id="displayArea">
            <div id="loading" class="hidden status-msg">Searching archives...</div>
            <div id="error" class="hidden error-msg"></div>
            <div id="success" class="hidden">
                <h3>Upcoming Holidays:</h3>
                <ul id="resultsList"></ul>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
